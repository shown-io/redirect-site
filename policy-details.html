<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>بي كير | تفاصيل وثيقة التأمين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=Readex+Pro:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/offers.css"/>
</head>
<body class="offers-page">

<div id="app-header" data-variant="inquiry"></div>

<!-- شريط الخطوات -->
<div class="stepper-wrap">
  <div class="stepper">
    <a href="index.html" class="stepper-step stepper-done">
      <span class="stepper-num">1</span>
      <span class="stepper-lbl">البيانات الرئيسية</span>
    </a>
    <span class="stepper-line"></span>
    <div class="stepper-step stepper-current">
      <span class="stepper-num">2</span>
      <span class="stepper-lbl">تفاصيل وثيقة التأمين</span>
    </div>
    <span class="stepper-line"></span>
    <div class="stepper-step stepper-upcoming">
      <span class="stepper-num">3</span>
      <span class="stepper-lbl">الشركات والعروض</span>
    </div>
    <span class="stepper-line"></span>
    <div class="stepper-step stepper-upcoming">
      <span class="stepper-num">4</span>
      <span class="stepper-lbl">المدفوعات والدفع</span>
    </div>
  </div>
</div>

<main class="off-main">
  <div class="off-container">
    <div class="off-card">
      <div class="off-card-header">
        <span class="material-icons" style="color:rgba(255,255,255,.8);font-size:1.1rem">description</span>
        <h1 class="off-card-title">تفاصيل وثيقة التأمين</h1>
      </div>
      <div class="off-card-body">
        <form class="off-form" id="policy-form" novalidate autocomplete="off">

          <!-- رقم الهوية (read-only) -->
          <div class="off-group">
            <label class="off-label">رقم الهوية / الإقامة</label>
            <input type="text" id="pd-national-id" class="off-input" readonly placeholder="يُجلب تلقائياً"/>
          </div>

          <!-- الاسم الكامل -->
          <div class="off-group">
            <label class="off-label" for="pd-fullname">الاسم الكامل</label>
            <input type="text" id="pd-fullname" name="fullName" class="off-input" placeholder="أدخل الاسم الكامل"/>
            <div class="off-error" id="err-fullname"></div>
          </div>

          <!-- تاريخ الميلاد (هجري) — 3 custom dropdowns -->
          <div class="off-group">
            <label class="off-label">تاريخ الميلاد (هجري)</label>
            <div class="off-row-3">
              <!-- اليوم -->
              <div class="cdd-wrap" id="cdd-day">
                <button type="button" class="cdd-trigger" data-cdd="cdd-day" aria-haspopup="listbox" aria-expanded="false">
                  <span class="cdd-text">اليوم</span>
                  <span class="material-icons cdd-arrow">expand_more</span>
                </button>
                <div class="cdd-panel hidden" role="listbox"></div>
                <input type="hidden" id="pd-birth-day" name="birthDay"/>
              </div>
              <!-- الشهر -->
              <div class="cdd-wrap" id="cdd-month">
                <button type="button" class="cdd-trigger" data-cdd="cdd-month" aria-haspopup="listbox" aria-expanded="false">
                  <span class="cdd-text">الشهر</span>
                  <span class="material-icons cdd-arrow">expand_more</span>
                </button>
                <div class="cdd-panel hidden" role="listbox"></div>
                <input type="hidden" id="pd-birth-month" name="birthMonth"/>
              </div>
              <!-- السنة -->
              <div class="cdd-wrap" id="cdd-birth-year">
                <button type="button" class="cdd-trigger" data-cdd="cdd-birth-year" aria-haspopup="listbox" aria-expanded="false">
                  <span class="cdd-text">السنة</span>
                  <span class="material-icons cdd-arrow">expand_more</span>
                </button>
                <div class="cdd-panel hidden" role="listbox"></div>
                <input type="hidden" id="pd-birth-year" name="birthYear"/>
              </div>
            </div>
            <div class="off-error" id="err-birthdate"></div>
          </div>

          <!-- رقم الجوال -->
          <div class="off-group">
            <label class="off-label" for="pd-mobile">رقم الجوال</label>
            <input type="text" id="pd-mobile" name="mobile" class="off-input" placeholder="05xxxxxxxx" maxlength="10" inputmode="numeric"/>
            <div class="off-error" id="err-mobile"></div>
          </div>

          <!-- نوع التأمين -->
          <div class="off-group">
            <label class="off-label">نوع التأمين</label>
            <div class="cdd-wrap" id="cdd-ins-type">
              <button type="button" class="cdd-trigger" data-cdd="cdd-ins-type" aria-haspopup="listbox" aria-expanded="false">
                <span class="cdd-text">اختر</span>
                <span class="material-icons cdd-arrow">expand_more</span>
              </button>
              <div class="cdd-panel hidden" role="listbox"></div>
              <input type="hidden" id="pd-ins-type" name="insuranceType"/>
            </div>
            <div class="off-error" id="err-ins-type"></div>
          </div>

          <!-- تاريخ بداية التأمين -->
          <div class="off-group">
            <label class="off-label">تاريخ بداية التأمين</label>
            <div class="pd-input-icon-wrap">
              <span class="material-icons pd-input-icon">calendar_today</span>
              <input type="text" id="pd-policy-start" name="policyStartDate" class="off-input" readonly/>
            </div>
            <div class="off-error" id="err-policy-start"></div>
          </div>

          <!-- الغرض من استخدام المركبة -->
          <div class="off-group">
            <label class="off-label">الغرض من استخدام المركبة</label>
            <div class="cdd-wrap" id="cdd-purpose">
              <button type="button" class="cdd-trigger" data-cdd="cdd-purpose" aria-haspopup="listbox" aria-expanded="false">
                <span class="cdd-text">اختر</span>
                <span class="material-icons cdd-arrow">expand_more</span>
              </button>
              <div class="cdd-panel hidden" role="listbox"></div>
              <input type="hidden" id="pd-purpose" name="vehiclePurpose"/>
            </div>
            <div class="off-error" id="err-purpose"></div>
          </div>

          <!-- القيمة التقديرية للمركبة -->
          <div class="off-group">
            <label class="off-label" for="pd-vehicle-value">القيمة التقديرية للمركبة</label>
            <div class="pd-input-icon-wrap">
              <span class="material-icons pd-input-icon" style="color:#faa62e">payments</span>
              <input type="text" id="pd-vehicle-value" name="vehicleValue" class="off-input" placeholder="10,000 - 1,000,000 ريال" inputmode="numeric" maxlength="12"/>
            </div>
            <div class="off-error" id="err-vehicle-value"></div>
          </div>

          <!-- سنة صنع المركبة -->
          <div class="off-group">
            <label class="off-label">سنة صنع المركبة</label>
            <div class="cdd-wrap" id="cdd-mfg-year">
              <button type="button" class="cdd-trigger" data-cdd="cdd-mfg-year" aria-haspopup="listbox" aria-expanded="false">
                <span class="cdd-text">إختر</span>
                <span class="material-icons cdd-arrow">expand_more</span>
              </button>
              <div class="cdd-panel hidden" role="listbox"></div>
              <input type="hidden" id="pd-mfg-year" name="manufacturingYear"/>
            </div>
            <div class="off-error" id="err-mfg-year"></div>
          </div>

          <!-- ماركة ونوع المركبة -->
          <div class="off-group">
            <label class="off-label" for="pd-car-brand">ماركة ونوع المركبة</label>
            <input type="text" id="pd-car-brand" name="carBrand" class="off-input" placeholder="مثال: تويوتا كامري"/>
            <div class="off-error" id="err-car-brand"></div>
          </div>

          <!-- مكان اصلاح المركبة -->
          <div class="off-group">
            <label class="off-label">مكان اصلاح المركبة</label>
            <div class="off-radio-group">
              <label class="off-radio-opt selected">
                <span class="off-radio-lbl">الوكالة</span>
                <input type="radio" name="repairPlace" value="agency" id="repair-agency" checked/>
              </label>
              <label class="off-radio-opt">
                <span class="off-radio-lbl">الورشة</span>
                <input type="radio" name="repairPlace" value="workshop" id="repair-workshop"/>
              </label>
            </div>
            <div class="off-error" id="err-repair"></div>
          </div>

          <!-- الأزرار -->
          <div class="off-btn-col" style="margin-top:.5rem">
            <button type="button" class="off-btn-secondary" onclick="window.location.href='index.html'">رجوع</button>
            <button type="submit" class="off-btn-primary" id="pd-submit-btn">إظهار العروض</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</main>

<!-- التقويم المخصص لتاريخ بداية التأمين -->
<div class="pd-cal-overlay hidden" id="pd-cal-overlay">
  <div class="pd-cal-picker" id="pd-cal-picker">
    <div class="pd-cal-header">
      <button type="button" class="pd-cal-nav-btn" id="pd-cal-prev">&#8249;</button>
      <button type="button" class="pd-cal-title-btn" id="pd-cal-title"></button>
      <button type="button" class="pd-cal-nav-btn" id="pd-cal-next">&#8250;</button>
    </div>
    <div class="pd-cal-body" id="pd-cal-body"></div>
  </div>
</div>

<div id="app-footer"></div>
<script src="js/layout.js?v=3"></script>
<script src="js/policy-details.js?v=3"></script>
</body>
</html>
